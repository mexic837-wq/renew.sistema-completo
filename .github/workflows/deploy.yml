name: Deploy to VPS

on:
  push:
    branches:
      - main # Cambia esto si tu rama principal se llama 'master'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar script de despliegue via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Aquí llamamos al script que ya tienes en el VPS
            /home/apps/renew-water/deploy.sh